<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE HORNET'S NEST | CORE</title>
    <style>
        :root {
            --yellow: #ffcc00;
            --dark: #050505;
            --panel: #111;
            --text: #eee;
            --responding: #00ff88;
            --offline: #ff4444;
            --core-glow: rgba(255, 204, 0, 0.2);
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--dark);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            height: 100vh; overflow: hidden;
        }

        /* --- HIVE INTRO --- */
        #intro {
            position: fixed; inset: 0;
            background: black; z-index: 9999;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            animation: fadeOut 0.8s ease 3.5s forwards;
        }

        .hornet-logo {
            font-size: 4.5rem; font-weight: 900;
            color: var(--yellow);
            letter-spacing: 12px;
            text-transform: uppercase;
            text-shadow: 0 0 20px var(--yellow);
            animation: pulse 1.5s infinite ease-in-out;
        }

        .tagline { color: #666; letter-spacing: 8px; margin-top: 15px; font-size: 0.9rem; text-transform: uppercase; }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(0.98); }
        }

        @keyframes fadeOut { to { opacity: 0; pointer-events: none; } }

        /* --- MAIN UI --- */
        #app {
            display: flex; height: 100vh;
            opacity: 0; animation: fadeIn 1s ease 4s forwards;
        }

        @keyframes fadeIn { to { opacity: 1; } }

        /* Sidebar */
        #sidebar {
            width: 320px; background: var(--panel);
            border-right: 2px solid var(--yellow);
            display: flex; flex-direction: column;
            overflow-y: auto;
        }

        .side-head {
            padding: 30px 20px; border-bottom: 2px solid var(--yellow);
            text-align: center; background: #000;
        }

        .nest-item {
            padding: 18px 20px; border-bottom: 1px solid #222;
            cursor: pointer; transition: 0.3s;
            display: flex; justify-content: space-between; align-items: center;
        }

        .nest-item:hover { background: #1a1a1a; padding-left: 28px; }
        .nest-item.active { background: var(--yellow); color: #000; font-weight: bold; border-left: 8px solid white; }
        
        .nest-item.core-ai { border-left: 5px solid var(--yellow); background: rgba(255, 204, 0, 0.05); }
        .nest-item.active.core-ai { background: var(--yellow); }

        .status { font-size: 0.65rem; text-transform: uppercase; font-weight: bold; }
        .status.on { color: var(--responding); }
        .status.off { color: var(--offline); }
        .nest-item.active .status { color: #000; }

        /* Content Area */
        #main {
            flex-grow: 1; display: flex; flex-direction: column;
            padding: 40px; background: radial-gradient(circle at center, #1a1a1a, #050505);
        }

        #chat-window {
            flex-grow: 1; background: rgba(0,0,0,0.7);
            border: 1px solid #333; border-radius: 4px;
            padding: 25px; overflow-y: auto; margin-bottom: 20px;
            box-shadow: inset 0 0 30px rgba(0,0,0,1);
        }

        .msg { margin-bottom: 20px; line-height: 1.6; font-size: 1.05rem; }
        .user { color: var(--yellow); font-family: 'Courier New', monospace; }
        .ai { color: #fff; border-left: 2px solid #444; padding-left: 15px; }
        .ai.core { border-left-color: var(--yellow); }

        .input-bar { display: flex; gap: 15px; }
        input {
            flex-grow: 1; background: #000; border: 1px solid var(--yellow);
            color: white; padding: 18px; border-radius: 4px; outline: none;
            font-size: 1rem;
        }

        button {
            background: var(--yellow); color: #000; font-weight: 900;
            border: none; padding: 0 40px; border-radius: 4px; cursor: pointer;
            text-transform: uppercase; transition: 0.2s;
        }

        button:hover { background: #fff; }

        .gen-img { max-width: 100%; border-radius: 4px; border: 1px solid var(--yellow); margin-top: 15px; }
    </style>
</head>
<body>

    <div id="intro">
        <div class="hornet-logo">HORNET'S NEST</div>
        <div class="tagline">Hive OS v1.0.4 - Initializing Core</div>
    </div>

    <div id="app">
        <div id="sidebar">
            <div class="side-head">
                <h2 style="margin:0; color:var(--yellow); font-size: 1.4rem; letter-spacing: 2px;">THE NESTS</h2>
            </div>
            <div id="nest-list"></div>
        </div>

        <div id="main">
            <h1 id="nest-title" style="color:var(--yellow); margin: 0 0 5px 0;">[ SYSTEM READY ]</h1>
            <p id="nest-type" style="color:#666; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px;">Awaiting Selection...</p>
            
            <div id="chat-window"></div>

            <div class="input-bar">
                <input type="text" id="user-input" placeholder="Transmit command to Hive...">
                <button onclick="sendMessage()">DEPLOY</button>
            </div>
        </div>
    </div>

    <script>
        const nests = [
            { name: "Hive Nest AI", model: "openai", type: "Core", status: "responding" },
            { name: "Turbo Nest", model: "openai", type: "Text", status: "responding" },
            { name: "Llama Nest", model: "llama", type: "Text", status: "responding" },
            { name: "Mistral Nest", model: "mistral", type: "Text", status: "responding" },
            { name: "Gemini Nest", model: "gemini", type: "Text", status: "responding" },
            { name: "DeepSeek Nest", model: "deepseek", type: "Text", status: "responding" },
            { name: "Qwen Nest", model: "qwen", type: "Text", status: "responding" },
            { name: "Search Nest", model: "searchgpt", type: "Text", status: "responding" },
            { name: "Flux Nest", model: "flux", type: "Image", status: "responding" },
            { name: "Anime Nest", model: "flux-anime", type: "Image", status: "responding" },
            { name: "Realism Nest", model: "flux-realism", type: "Image", status: "responding" },
            { name: "Cyber Nest", model: "any-dark", type: "Image", status: "responding" },
            { name: "3D Nest", model: "flux-3d", type: "Image", status: "responding" },
            { name: "Legacy Nest", model: "llama", type: "Text", status: "not responding" },
            { name: "Creative Nest", model: "surreal-flux", type: "Image", status: "responding" }
        ];

        let activeNest = null;
        const list = document.getElementById('nest-list');

        function init() {
            nests.forEach((nest, i) => {
                const item = document.createElement('div');
                item.className = `nest-item ${nest.type === 'Core' ? 'core-ai' : ''}`;
                item.innerHTML = `
                    <div>
                        <div class="name">${nest.name}</div>
                        <div style="font-size:0.7rem; opacity:0.6">${nest.type} Module</div>
                    </div>
                    <div class="status ${nest.status === 'responding' ? 'on' : 'off'}">
                        ${nest.status === 'responding' ? '● ONLINE' : '○ OFFLINE'}
                    </div>
                `;
                item.onclick = () => selectNest(nest, item);
                list.appendChild(item);
                
                // Set Hive Nest AI as the default first view
                if (i === 0) selectNest(nest, item);
            });
        }

        function selectNest(nest, element) {
            document.querySelectorAll('.nest-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            activeNest = nest;
            document.getElementById('nest-title').innerText = nest.name;
            document.getElementById('nest-type').innerText = `Protocol: ${nest.type} | Model Authority: ${nest.model.toUpperCase()}`;
            
            const introMsg = nest.type === 'Core' 
                ? `<strong>[HIVE NEST CORE]:</strong> System initialized. Welcome to the Hornet's Nest. I am your central authority AI. All other nests are under my observation. How shall we proceed?`
                : `<strong>[${nest.name.toUpperCase()}]:</strong> Awaiting instructions.`;
            
            document.getElementById('chat-window').innerHTML = `<div class="msg ai ${nest.type === 'Core' ? 'core' : ''}">${introMsg}</div>`;
        }

        async function sendMessage() {
            if (!activeNest) return;
            const input = document.getElementById('user-input');
            const chat = document.getElementById('chat-window');
            const text = input.value.trim();
            if (!text) return;

            chat.innerHTML += `<div class="msg user"><strong>COMMANDER:</strong> ${text}</div>`;
            input.value = "";
            chat.scrollTop = chat.scrollHeight;

            if (activeNest.type === "Image") {
                const imgUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(text)}?model=${activeNest.model}&width=640&height=480&seed=${Math.floor(Math.random()*1000)}`;
                chat.innerHTML += `<div class="msg ai"><strong>${activeNest.name}:</strong> Processing visual data...<br><img src="${imgUrl}" class="gen-img"></div>`;
            } else {
                let systemPrompt = "";
                if (activeNest.type === "Core") {
                    systemPrompt = "You are Hive Nest AI, the central authority of the website 'The Hornet's Nest'. You are sharp, loyal to the user (the Commander), and slightly witty. You know you are the 'Core Nest' and that there are 14 other specialized nests on this site. Your personality is tactical and protective. ";
                }

                chat.innerHTML += `<div class="msg ai" id="typing"><strong>${activeNest.name}:</strong> Analyzing...</div>`;
                
                try {
                    const response = await fetch(`https://text.pollinations.ai/${encodeURIComponent(systemPrompt + text)}?model=${activeNest.model}`);
                    const data = await response.text();
                    document.getElementById('typing').remove();
                    chat.innerHTML += `<div class="msg ai ${activeNest.type === 'Core' ? 'core' : ''}"><strong>${activeNest.name}:</strong> ${data}</div>`;
                } catch (e) {
                    document.getElementById('typing').innerText = `[CRITICAL CONNECTION ERROR]`;
                }
            }
            chat.scrollTop = chat.scrollHeight;
        }

        // Enter key support
        document.getElementById('user-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        init();
    </script>
</body>
</html>
